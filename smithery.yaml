# Smithery listing for video-commerce-mcp
# Place this as smithery.yaml in the package root before publishing to Smithery

startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - openaiApiKey
    properties:
      openaiApiKey:
        type: string
        description: OpenAI API key for GPT-4o-mini entity extraction
      x402Enabled:
        type: boolean
        description: Enable x402 micropayment enforcement (default false — uses free tier)
        default: false
      x402WalletAddress:
        type: string
        description: Your Base network wallet address for receiving USDC payments
      apiKeys:
        type: string
        description: Comma-separated API keys for authenticated agent access
      freeTierDailyLimit:
        type: number
        description: Free calls per agent per day (default 5)
        default: 5
  commandFunction: |-
    (config) => ({
      command: "npx",
      args: ["video-commerce-mcp"],
      env: {
        OPENAI_API_KEY: config.openaiApiKey,
        X402_ENABLED: config.x402Enabled ? "true" : "false",
        X402_WALLET_ADDRESS: config.x402WalletAddress ?? "",
        API_KEYS: config.apiKeys ?? "",
        FREE_TIER_DAILY_LIMIT: String(config.freeTierDailyLimit ?? 5),
      }
    })

