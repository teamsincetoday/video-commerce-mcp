# Fly.io deployment configuration for Video Commerce Intelligence MCP Server
#
# Deploy:
#   fly launch --name video-commerce-mcp
#   fly secrets set OPENAI_API_KEY=sk-...
#   fly deploy
#
# Environment variables to set via `fly secrets set`:
#   OPENAI_API_KEY       (required)
#   X402_ENABLED         (optional, default: false)
#   X402_WALLET_ADDRESS  (optional, required if X402_ENABLED=true)
#   API_KEYS             (optional, comma-separated)

app = "video-commerce-mcp"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3001"
  NODE_ENV = "production"
  ANALYSIS_CACHE_DIR = "/data/cache"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    port = 3001
    type = "http"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[mounts]
  source = "mcp_data"
  destination = "/data"
  initial_size = "1"
